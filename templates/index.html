<!DOCTYPE html>
<html>
<head>
    <title>POC Pratiche</title>
</head>
<body>

<h2>Seleziona servizio</h2>
<select id="services"></select>

<h3>Documenti richiesti</h3>
<div id="documents"></div>

<script>
async function loadServices() {
    const res = await fetch('/api/services')
    const data = await res.json()

    const select = document.getElementById('services')

    data.forEach(s => {
        const opt = document.createElement('option')
        opt.value = s.variant_id
        opt.text = s.service_name + " - " + s.variant_name
        select.appendChild(opt)
    })

    select.onchange = () => loadDetail(select.value)
}

async function loadDetail(id) {
    const res = await fetch(`/api/services/${id}`)
    const data = await res.json()

    const container = document.getElementById('documents')
    container.innerHTML = ""

    data.documents.forEach(doc => {
        const div = document.createElement('div')

        div.innerHTML = `
            <p>${doc.name}</p>
            <input type="file" onchange="uploadFile(event, '${doc.code}')"/>
        `

        container.appendChild(div)
    })
}

async function uploadFile(event, type) {
    const file = event.target.files[0]
    const formData = new FormData()

    formData.append("file", file)
    formData.append("document_type", type)

    await fetch('/api/upload', {
        method: 'POST',
        body: formData
    })

    alert("Caricato")
}

loadServices()
</script>

</body>
</html>
